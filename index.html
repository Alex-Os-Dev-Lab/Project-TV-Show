<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Alex Okorefe (Alex-Os-Dev-Lab)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header>
      <h1>TV Shows</h1>
    </header>

    <!-- Navigation back button - hidden by default -->
    <nav id="nav-bar" class="hidden">
      <button id="back-btn">← Back to Shows</button>
    </nav>

    <!-- Shows search bar - visible on shows view -->
    <div id="shows-search-bar" class="view">
      <input
        type="text"
        id="shows-search-input"
        placeholder="Search shows..."
      />
      <select id="show-select">
        <option value="">-- Select a show --</option>
      </select>
    </div>

    <!-- Episodes controls - hidden by default -->
    <div id="episodes-controls" class="hidden">
      <input type="text" id="search-input" placeholder="Search episodes..." />
      <select id="episode-select">
        <option value="">-- Select an episode --</option>
      </select>
      <p id="searchCount"></p>
    </div>

    <!-- Shows listing container -->
    <div id="shows-container" class="view">
      <p class="status-message">Loading shows...</p>
    </div>

    <!-- Episodes listing container - hidden by default -->
    <div id="episodes-container" class="view hidden">
      <p class="status-message">Loading episodes...</p>
    </div>

    <footer>
      <p>
        Data provided by
        <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
      </p>
    </footer>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
